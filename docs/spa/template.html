<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LaborAid Rate Engine — Product Walkthrough</title>
  <meta name="description" content="LaborAid Rate Engine — overview, architecture, and validation status. AI-driven extraction of union rate sheets from CBAs and rate notices. NBS for LaborAid.">
  <meta name="robots" content="noindex,nofollow">

  <!-- Render-time deps via CDN. Pinned so the SPA is reproducible.
       Only marked + mermaid — no syntax highlighting. Code blocks render
       in monospace via the embedded CSS; that's enough for a doc deck. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>

  <style>
    /* === LaborAid brand palette ==========================================
       navy #16295D · deep #0F1C42 · light-navy #2A3F7A · gold #F8C431 · red #C50000
       Default theme is LIGHT (CTO-doc legible); dark is opt-in via [data-theme=dark]. */
    :root {
      --navy: #16295D;
      --navy-deep: #0F1C42;
      --navy-light: #2A3F7A;
      --gold: #F8C431;
      --bg: #eef1f8;
      --panel: #ffffff;
      --panel-2: #f4f6fc;
      --border: #d8deef;
      --text: #1b2548;
      --text-dim: #5d678a;
      --accent: #16295D;
      --accent-deep: #0F1C42;
      --good: #15803d;
      --warn: #b8860b;
      --bad: #C50000;
      --code-bg: #0F1C42;
      --code-text: #e7ecf7;
      --table-stripe: rgba(22, 41, 93, 0.045);
    }
    :root[data-theme="dark"] {
      --bg: #0b1530;
      --panel: #11203f;
      --panel-2: #0f1c3a;
      --border: #25365f;
      --text: #e7ecf7;
      --text-dim: #9aa7c7;
      --accent: #F8C431;
      --accent-deep: #f6b91a;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #ff6b6b;
      --code-bg: #060d20;
      --code-text: #e7ecf7;
      --table-stripe: rgba(255, 255, 255, 0.04);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.55;
    }

    /* === Header (always LaborAid navy) ==================================== */
    header.topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 11px 24px;
      background: linear-gradient(100deg, var(--navy-deep), var(--navy) 55%, var(--navy-light));
      border-bottom: 3px solid var(--gold);
      box-shadow: 0 2px 8px rgba(15, 28, 66, 0.22);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-logo {
      width: 38px; height: 38px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      padding: 2px;
    }
    .brand-title {
      display: flex; flex-direction: column;
      line-height: 1.15;
    }
    .brand-title .t1 { font-weight: 700; font-size: 15px; color: #ffffff; letter-spacing: 0.2px; }
    .brand-title .t2 { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.3px; }

    .topbar-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-block;
      padding: 4px 11px;
      border-radius: 999px;
      background: var(--gold);
      color: var(--navy-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    button.icon-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.22);
      color: #e7ecf7;
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: grid; place-items: center;
    }
    button.icon-btn:hover { color: var(--gold); border-color: var(--gold); }

    /* === Tabs ============================================================== */
    nav.tabs {
      display: flex;
      gap: 4px;
      padding: 8px 24px 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 60px;
      z-index: 40;
    }
    nav.tabs button {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 12px 18px 14px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    nav.tabs button:hover { color: var(--navy); }
    nav.tabs button.active {
      color: var(--navy);
      font-weight: 700;
      border-bottom-color: var(--gold);
    }
    :root[data-theme="dark"] nav.tabs button.active { color: var(--gold); }
    nav.tabs .tab-tag {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: rgba(22,41,93,0.10);
      color: var(--text-dim);
      vertical-align: 2px;
    }
    nav.tabs button.active .tab-tag {
      background: var(--gold);
      color: var(--navy-deep);
    }

    /* === Body layout ====================================================== */
    main.app-body {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 110px);
    }
    aside.toc {
      position: sticky;
      top: 110px;
      align-self: flex-start;
      max-height: calc(100vh - 110px);
      overflow-y: auto;
      padding: 24px 16px;
      border-right: 1px solid var(--border);
      background: var(--panel-2);
    }
    aside.toc h3 {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 0 0 10px 8px;
    }
    aside.toc ol {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    aside.toc li a {
      display: block;
      padding: 6px 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      border-left: 2px solid transparent;
      line-height: 1.35;
    }
    aside.toc li a:hover {
      color: var(--text);
      border-left-color: var(--border);
    }
    aside.toc li a.active {
      color: var(--navy);
      border-left-color: var(--gold);
      background: rgba(22,41,93,0.06);
      font-weight: 600;
    }
    :root[data-theme="dark"] aside.toc li a.active { color: var(--gold); }
    aside.toc li.level-3 a { padding-left: 22px; font-size: 12px; }

    article.content {
      padding: 32px 40px 80px;
      max-width: 1100px;
      width: 100%;
    }

    /* === Markdown styling ================================================== */
    article.content h1 {
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    article.content h2 {
      font-size: 22px;
      margin-top: 36px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    article.content h3 { font-size: 17px; margin-top: 28px; margin-bottom: 10px; color: var(--accent); }
    article.content h4 { font-size: 15px; margin-top: 22px; margin-bottom: 8px; color: var(--text-dim); }
    article.content p, article.content ul, article.content ol { margin: 10px 0; }
    article.content a { color: var(--accent); text-decoration: none; }
    article.content a:hover { text-decoration: underline; }

    article.content blockquote {
      margin: 16px 0;
      padding: 14px 18px;
      border-left: 4px solid var(--gold);
      background: rgba(22,41,93,0.05);
      border-radius: 0 8px 8px 0;
      color: var(--text);
    }
    article.content blockquote strong { color: var(--navy); }
    :root[data-theme="dark"] article.content blockquote strong { color: var(--gold); }

    article.content code {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }
    article.content pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    article.content pre code {
      background: transparent;
      padding: 0;
      font-size: 13px;
      line-height: 1.5;
    }

    article.content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    article.content thead {
      background: var(--panel-2);
    }
    article.content th, article.content td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    article.content th {
      font-weight: 600;
      color: var(--text);
      font-size: 13px;
    }
    article.content tbody tr:nth-child(even) { background: var(--table-stripe); }
    article.content tbody tr:last-child td { border-bottom: none; }

    article.content hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    /* === Mermaid =========================================================== */
    article.content .mermaid-wrapper {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin: 18px 0;
      overflow-x: auto;
    }
    article.content .mermaid {
      text-align: center;
    }
    article.content .mermaid svg {
      max-width: 100%;
      height: auto;
    }

    /* === Footer ============================================================ */
    footer.app-footer {
      border-top: 1px solid var(--border);
      padding: 16px 40px;
      color: var(--text-dim);
      font-size: 12px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      background: var(--panel);
    }
    footer.app-footer .right { margin-left: auto; }

    /* === Mobile ============================================================ */
    @media (max-width: 900px) {
      main.app-body { grid-template-columns: 1fr; }
      aside.toc { display: none; }
      article.content { padding: 24px 18px 60px; }
      nav.tabs { overflow-x: auto; }
      nav.tabs button { padding: 12px 12px 14px; font-size: 13px; }
    }

    /* === Print ============================================================= */
    @media print {
      header.topbar, nav.tabs, aside.toc, footer.app-footer, button { display: none !important; }
      main.app-body { grid-template-columns: 1fr; }
      article.content { padding: 0; max-width: 100%; }
      .doc-pane { display: block !important; page-break-after: always; }
      .doc-pane:last-child { page-break-after: auto; }
      body { background: white; color: black; font-size: 12px; }
      article.content code, article.content pre { background: #f1f5f9; color: #0b1220; border: 1px solid #cbd5e1; }
      article.content blockquote { background: #f1f5f9; border-left-color: #0284c7; }
    }

    .doc-pane { display: none; }
    .doc-pane.active { display: block; }

    /* loading shimmer */
    .loading {
      padding: 40px;
      color: var(--text-dim);
      text-align: center;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img class="brand-logo" src="data:image/png;base64,__SHIELD_B64__" alt="LaborAid">
    <div class="brand-title">
      <div class="t1">LaborAid Rate Engine</div>
      <div class="t2">Product Walkthrough · NBS for LaborAid</div>
    </div>
  </div>
  <div class="topbar-meta">
    <span class="badge" id="updated-badge">Updated __BUILD_DATE__</span>
    <button class="icon-btn" id="theme-toggle" title="Toggle dark / light" aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="icon-btn" id="print-btn" title="Print / export PDF" aria-label="Print">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    </button>
  </div>
</header>

<nav class="tabs" role="tablist">
  <button class="active" data-tab="flow" role="tab" aria-selected="true">Architecture<span class="tab-tag">FLOW · SERVICES · PIPELINE</span></button>
  <button data-tab="services" role="tab" aria-selected="false">Admin<span class="tab-tag">FEATURES · USER GUIDE</span></button>
  <button data-tab="errors" role="tab" aria-selected="false">Business<span class="tab-tag">REVIEW · IMPROVE · APPROVE</span></button>
</nav>

<main class="app-body">
  <aside class="toc">
    <h3>On this page</h3>
    <ol id="toc-list"></ol>
  </aside>
  <article class="content">
    <div class="doc-pane active" id="pane-flow"><div class="loading">Loading…</div></div>
    <div class="doc-pane" id="pane-services"><div class="loading">Loading…</div></div>
    <div class="doc-pane" id="pane-errors"><div class="loading">Loading…</div></div>
  </article>
</main>

<footer class="app-footer">
  <span>NorthBay Solutions · LaborAid Rate Engine POC · Built __BUILD_DATE__</span>
  <span class="right">commit <code id="commit-hash">__COMMIT_HASH__</code></span>
</footer>

<!-- Markdown sources are inlined here at build time. Triple-base64 to dodge any parser quirks. -->
<script id="doc-flow-md" type="text/markdown">__DOC_FLOW_PLACEHOLDER__</script>
<script id="doc-services-md" type="text/markdown">__DOC_SERVICES_PLACEHOLDER__</script>
<script id="doc-errors-md" type="text/markdown">__DOC_ERRORS_PLACEHOLDER__</script>

<script>
  // --- marked configuration (v13 API) ----------------------------------------
  // Self-contained renderer override — no chaining into the original renderer.
  // marked v13 calls renderer.code with a token object `{type, raw, lang, text}`.
  // We emit the final HTML directly so there's no `bind(this)` chain that v13
  // can trip on. Mermaid blocks become <div class="mermaid"> for mermaid.run();
  // everything else becomes <pre><code class="language-xxx">…</code></pre>.
  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  marked.setOptions({ gfm: true, breaks: false });
  marked.use({
    renderer: {
      // marked@13.0.3 still calls renderer.code with positional args
      // (code: string, infostring: string, escaped: boolean) despite the
      // docs claiming a token argument. Support both shapes defensively.
      code(arg1, arg2 /*, arg3*/) {
        let text, lang;
        if (typeof arg1 === 'string') {
          text = arg1;
          lang = String(arg2 || '').match(/^\S*/)[0];
        } else if (arg1 && typeof arg1 === 'object') {
          text = arg1.text || '';
          lang = String(arg1.lang || '').match(/^\S*/)[0];
        } else {
          text = '';
          lang = '';
        }
        if (lang === 'mermaid') {
          const id = 'mmd-' + Math.random().toString(36).slice(2, 9);
          return `<div class="mermaid-wrapper"><div class="mermaid" id="${id}">${escapeHtml(text)}</div></div>`;
        }
        const cls = lang ? ` class="language-${escapeHtml(lang)}"` : '';
        return `<pre><code${cls}>${escapeHtml(text)}</code></pre>\n`;
      },
    },
  });

  // --- mermaid configuration (LaborAid brand) --------------------------------
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    securityLevel: 'loose',
    flowchart: { curve: 'basis', useMaxWidth: true },
    themeVariables: {
      primaryColor: '#16295D',
      primaryTextColor: '#ffffff',
      primaryBorderColor: '#0F1C42',
      lineColor: '#2A3F7A',
      secondaryColor: '#F8C431',
      secondaryTextColor: '#16295D',
      tertiaryColor: '#eef1f8',
      tertiaryTextColor: '#16295D',
      clusterBkg: '#f4f6fc',
      clusterBorder: '#c7d0e8',
      fontFamily: 'inherit',
      fontSize: '14px',
    },
  });

  // --- doc loading -----------------------------------------------------------
  // UTF-8-safe base64 decode. atob() returns a binary string; we need to walk
  // its bytes through TextDecoder so em-dashes / arrows / non-ASCII survive.
  function decodeDoc(id) {
    const el = document.getElementById(id);
    if (!el) return '';
    const raw = (el.textContent || '').replace(/\s+/g, '');
    if (!raw) return '';
    try {
      const binary = atob(raw);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    } catch (e) {
      console.error('decodeDoc failed:', e);
      return '**Failed to decode doc payload — see console.**';
    }
  }

  function renderTab(tab) {
    const mdId = { flow: 'doc-flow-md', services: 'doc-services-md', errors: 'doc-errors-md' }[tab];
    const pane = document.getElementById('pane-' + tab);
    try {
      const md = decodeDoc(mdId);
      pane.innerHTML = marked.parse(md);
    } catch (err) {
      console.error('marked.parse failed for', tab, err);
      pane.innerHTML = `<div style="padding:20px;color:#f87171;">
        <h2>Render error</h2>
        <p>${(err && err.message) || err}</p>
        <pre style="background:#0b1220;padding:12px;border-radius:6px;overflow:auto;">${(err && err.stack) || ''}</pre>
      </div>`;
      return;
    }
    // Re-target inter-doc links to switch tabs instead of navigating away.
    pane.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href') || '';
      let mapTab = null;
      if (/PRODUCT_END_TO_END_FLOW\.md$/i.test(href)) mapTab = 'flow';
      else if (/PRODUCT_SERVICE_INVENTORY\.md$/i.test(href)) mapTab = 'services';
      else if (/PRODUCT_ERROR_AND_LOGGING_REFERENCE\.md$/i.test(href)) mapTab = 'errors';
      if (mapTab) {
        a.addEventListener('click', e => { e.preventDefault(); activateTab(mapTab); });
      }
    });
    // Mermaid render after the DOM updates.
    const mmdEls = pane.querySelectorAll('.mermaid');
    if (mmdEls.length) {
      mermaid.run({ nodes: mmdEls }).catch(err => console.error('mermaid:', err));
    }
    rebuildToc(pane);
  }

  // --- TOC sidebar -----------------------------------------------------------
  function rebuildToc(pane) {
    const toc = document.getElementById('toc-list');
    toc.innerHTML = '';
    pane.querySelectorAll('h2, h3').forEach((h, i) => {
      const id = h.id || ('h-' + i);
      h.id = id;
      const li = document.createElement('li');
      li.className = 'level-' + (h.tagName === 'H2' ? '2' : '3');
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      a.addEventListener('click', e => {
        e.preventDefault();
        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        history.replaceState(null, '', '#' + id);
      });
      li.appendChild(a);
      toc.appendChild(li);
    });

    // Highlight active section on scroll.
    const headings = Array.from(pane.querySelectorAll('h2, h3'));
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          toc.querySelectorAll('a').forEach(a => a.classList.remove('active'));
          const active = toc.querySelector('a[href="#' + e.target.id + '"]');
          if (active) active.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -60% 0px' });
    headings.forEach(h => obs.observe(h));
  }

  // --- tab switching ---------------------------------------------------------
  let renderedTabs = new Set();
  function activateTab(tab) {
    document.querySelectorAll('nav.tabs button').forEach(b => {
      const on = b.dataset.tab === tab;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on);
    });
    document.querySelectorAll('.doc-pane').forEach(p => {
      p.classList.toggle('active', p.id === 'pane-' + tab);
    });
    if (!renderedTabs.has(tab)) {
      renderTab(tab);
      renderedTabs.add(tab);
    } else {
      rebuildToc(document.getElementById('pane-' + tab));
    }
    history.replaceState(null, '', '?tab=' + tab);
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.addEventListener('click', () => activateTab(b.dataset.tab));
  });

  // --- theme toggle ----------------------------------------------------------
  // Default is LaborAid light (no data-theme attribute). Toggle flips to dark.
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const root = document.documentElement;
    if (root.getAttribute('data-theme') === 'dark') {
      root.removeAttribute('data-theme');
      root.style.colorScheme = 'light';
    } else {
      root.setAttribute('data-theme', 'dark');
      root.style.colorScheme = 'dark';
    }
  });

  // --- print -----------------------------------------------------------------
  document.getElementById('print-btn').addEventListener('click', () => {
    // Pre-render every tab so all 3 are in the DOM, then print.
    ['flow', 'services', 'errors'].forEach(t => {
      if (!renderedTabs.has(t)) {
        renderTab(t);
        renderedTabs.add(t);
      }
      document.getElementById('pane-' + t).classList.add('active');
    });
    setTimeout(() => window.print(), 250);
  });

  // --- initial render --------------------------------------------------------
  window.addEventListener('error', (e) => {
    console.error('window error:', e.message, e.filename, e.lineno);
  });
  try {
    const initial = new URLSearchParams(location.search).get('tab') || 'flow';
    activateTab(initial);
  } catch (err) {
    console.error('initial render failed:', err);
    document.getElementById('pane-flow').innerHTML =
      `<div style="padding:20px;color:#f87171;">Initial render failed: ${err.message}<br><pre>${err.stack}</pre></div>`;
  }
</script>

</body>
</html>
