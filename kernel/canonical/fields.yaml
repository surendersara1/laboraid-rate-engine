# Canonical field dictionary.
# Maps shared concepts -> the union-specific output labels that express them.
# The long model stores `canonical_field`; the profile maps it back to the
# exact column label each groundtruth uses (preserving "483"/"704"/"537" suffixes).

wage:                       [Wage]
wage_differential:          [Wage Differential]          # = wage x 1.15
wage_15x:                   [Wage 1.5x]                  # = wage x 1.5
wage_20x:                   [Wage 2.0x]                  # = wage x 2.0
wage_11x:                   [Wage 1.1x]                  # = wage x 1.1 (537)

temporary_heat:             [Temporary Heat]             # = wage x 0.60 (537)
temporary_heat_11x:         [Temporary Heat 1.1x]
temporary_heat_15x:         [Temporary Heat 1.5x]

health_welfare:             [Health & Welfare]
