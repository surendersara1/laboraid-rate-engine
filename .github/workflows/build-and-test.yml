name: build-and-test

# Runs unit tests + CDK synth + kernel evaluator on every PR (Spec/09 §13; BUILD H.2).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write # OIDC for AWS (deploy job; not needed for synth)
  contents: read

jobs:
  backend:
    name: CDK + Lambdas (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cdk
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run black --check .
      - name: Type check
        run: uv run mypy --strict laboraid_cdk
      - name: Unit tests (cdk)
        run: uv run pytest
      - name: Unit tests (lambdas)
        run: uv run pytest ../lambdas
      - name: CDK synth
        run: npx --yes aws-cdk@2 synth

  ui:
    name: React SPA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.15.9 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm exec vitest run
      - name: Build
        run: pnpm build

  kernel:
    name: Kernel regression gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kernel
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync kernel deps (incl. dev)
        run: uv sync --group dev
      - name: Unit + regression tests (rounding, per-union accuracy gate)
        run: uv run pytest -q
      - name: Accuracy gate (fail if any union < 99% on sourced cells)
        # Belt-and-suspenders with readable per-union accuracy logs; exits 1 on
        # header mismatch or sourced accuracy below the threshold.
        run: uv run python pipeline/run.py --all --min-accuracy 99.0

